# /etc/nginx/sites-available/horrible-chess
# Symlink into sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# TLS is terminated here with a Cloudflare Origin certificate
# (/etc/ssl/horrible-chess/origin.{pem,key}); the public domain is proxied
# through Cloudflare (orange cloud) with SSL mode Full (Strict). See deploy/README.md
# step 6 for minting the origin cert.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name horrible-chess.vicplusplus.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name horrible-chess.vicplusplus.com;

    ssl_certificate     /etc/ssl/horrible-chess/origin.pem;
    ssl_certificate_key /etc/ssl/horrible-chess/origin.key;

    # Reverse proxy everything (SPA, /api/*, /ws) to the Spring Boot jar.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws (STOMP). Harmless for plain HTTP requests.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Long-lived game connections shouldn't get reaped mid-match.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
