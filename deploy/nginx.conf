# /etc/nginx/sites-available/horrible-chess
# Symlink into sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
# After this is live on port 80, run:
#     sudo certbot --nginx -d horrible-chess.vicplusplus.com
# certbot will edit this file in place to add the SSL block and an HTTP→HTTPS
# redirect.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name horrible-chess.vicplusplus.com;

    # Reverse proxy everything (SPA, /api/*, /ws) to the Spring Boot jar.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws (STOMP). Harmless for plain HTTP requests.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Long-lived game connections shouldn't get reaped mid-match.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
